name: API Tests - Newman CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  api-tests:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/upload-artifact@v4
    
    - name: 📦 Setup Node.js ${{ matrix.node-version }}
      uses: actions/upload-artifact@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: 📚 Install Dependencies
      run: npm ci
    
    - name: 🧪 Run API Tests with Newman
      run: npm test
      continue-on-error: false
    
    - name: 📊 Generate HTML Report
      if: always()
      run: |
        mkdir -p test-results
        echo "Test execution completed at $(date)" > test-results/summary.txt
    
    - name: 📤 Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-node-${{ matrix.node-version }}
        path: results/
        retention-days: 30
    
    - name: 📋 Upload Coverage Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: coverage/
        retention-days: 30
    
    - name: ✅ Test Summary
      if: always()
      run: |
        echo "## API Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ Test execution completed on Node.js ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📊 Artifacts available in Actions tab" >> $GITHUB_STEP_SUMMARY
    
    - name: 💬 Comment on PR
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '🧪 **API Tests Complete**\n\nTest results are available in the Artifacts section. Check the workflow run for detailed reports.'
          })

  api-tests-macos:
    runs-on: macos-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/upload-artifact@v4
    
    - name: 📦 Setup Node.js
      uses: actions/upload-artifact@v4
      with:
        node-version: '18.x'
        cache: 'npm'
    
    - name: 📚 Install Dependencies
      run: npm ci
    
    - name: 🧪 Run API Tests
      run: npm test
      continue-on-error: false

  api-tests-windows:
    runs-on: windows-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/upload-artifact@v4
    
    - name: 📦 Setup Node.js
      uses: actions/upload-artifact@v4
      with:
        node-version: '18.x'
        cache: 'npm'
    
    - name: 📚 Install Dependencies
      run: npm ci
    
    - name: 🧪 Run API Tests
      run: npm test
      continue-on-error: false
